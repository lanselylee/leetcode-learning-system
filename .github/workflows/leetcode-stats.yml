name: Update LeetCode Stats

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch LeetCode Stats (official profile numbers)
        run: |
          curl -s https://leetcode.com/graphql \
          -H "Content-Type: application/json" \
          --data '{"query":"{ matchedUser(username: \"xiaomeng\") { submitStatsGlobal { acSubmissionNum { difficulty count } } } }"}' \
          > stats.json

      - name: Update README stats block
        run: |
          EASY=$(jq -r '.data.matchedUser.submitStatsGlobal.acSubmissionNum[] | select(.difficulty=="Easy") | .count' stats.json)
          MED=$(jq -r '.data.matchedUser.submitStatsGlobal.acSubmissionNum[] | select(.difficulty=="Medium") | .count' stats.json)
          HARD=$(jq -r '.data.matchedUser.submitStatsGlobal.acSubmissionNum[] | select(.difficulty=="Hard") | .count' stats.json)
          TOTAL=$(jq -r '.data.matchedUser.submitStatsGlobal.acSubmissionNum[] | select(.difficulty=="All") | .count' stats.json)

          # Replace the whole block between markers (safe even after many runs)
          perl -0777 -i -pe "s/<!-- LEETCODE_STATS_START -->.*?<!-- LEETCODE_STATS_END -->/<!-- LEETCODE_STATS_START -->\n- Easy: $EASY\n- Medium: $MED\n- Hard: $HARD\n- Total Solved: $TOTAL\n<!-- LEETCODE_STATS_END -->/s" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "leetcode-bot"
          git config user.email "leetcode-bot@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update LeetCode stats"
          git push
